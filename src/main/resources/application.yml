server:
  port: 8080

spring:
  application:
    name: order-grabbing-api

  datasource:
    url: jdbc:h2:mem:orderdb
    driver-class-name: org.h2.Driver
    username: sa
    password: 

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  h2:
    console:
      enabled: true
      path: /h2-console

jwt:
  secret: doubaoOrderGrabbingSecretKey2024VeryLongSecretKeyForJWT
  expiration: 86400000

logging:
  level:
    com.doubao: DEBUG
    org.springframework.web: DEBUG
