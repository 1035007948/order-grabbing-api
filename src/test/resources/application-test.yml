server:
  port: 8080

spring:
  application:
    name: order-grabbing-api-test
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  h2:
    console:
      enabled: false

jwt:
  secret: testSecretKeyForTestingPurposesOnlyVeryLongSecretKey
  expiration: 86400000

logging:
  level:
    com.doubao.ordergrabbing: DEBUG
